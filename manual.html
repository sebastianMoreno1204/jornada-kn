<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Manual de Jornada</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Calibri, Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 480px; overflow: hidden; }
    .header { background: #003366; padding: 24px 32px; }
    .header h1 { color: white; font-size: 20px; margin-bottom: 4px; }
    .header p { color: #a8c8f0; font-size: 13px; }
    .body { padding: 32px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; color: #333; background: #fafafa; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #003366; background: white; }
    textarea { resize: vertical; min-height: 80px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn { width: 100%; padding: 14px; background: #003366; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #004499; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; text-align: center; display: none; }
    .msg.success { background: #e6f4ea; color: #107C10; display: block; }
    .msg.error { background: #fde7e7; color: #D13438; display: block; }
    .note { font-size: 12px; color: #999; margin-top: 6px; }
    .optional { font-weight: normal; color: #aaa; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>✏️ Registro Manual de Jornada</h1>
      <p>Kuehne + Nagel — Air Logistics Perishables</p>
    </div>
    <div class="body">
      <div class="field">
        <label>Empleado</label>
        <input type="text" id="email" readonly style="background:#f0f0f0;color:#888;">
      </div>
      <div class="field">
        <label>Fecha</label>
        <select id="fecha"></select>
        <p class="note">Solo puedes registrar días de la semana en curso.</p>
      </div>
      <div class="row">
        <div class="field">
          <label>Hora Inicio</label>
          <input type="time" id="horaInicio">
        </div>
        <div class="field">
          <label>Hora Fin <span class="optional">(opcional)</span></label>
          <input type="time" id="horaFin">
        </div>
      </div>
      <div class="field">
        <label>Observaciones <span class="optional">(opcional)</span></label>
        <textarea id="observaciones" placeholder="Ej: Horas extra por cierre de mes, trabajo dominical por urgencia operativa..."></textarea>
      </div>
      <button class="btn" onclick="registrar()">Registrar Jornada</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const FLOW_URL = 'https://bd4a763d737defaeacf0e99a4d082f.58.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e4823f6ebe8e4d4b832c1647ac903fd4/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=japRBKwZhDFUnI0mYS1jr0MuMHPjzD-2Pfd08KYwfTI';

    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || '';
    document.getElementById('email').value = email;

    function getDiasSemana() {
      const hoy = new Date();
      const diaSemana = hoy.getDay();
      const lunes = new Date(hoy);
      const diffLunes = diaSemana === 0 ? -6 : 1 - diaSemana;
      lunes.setDate(hoy.getDate() + diffLunes);
      const dias = [];
      for (let i = 0; i <= 6; i++) {
        const dia = new Date(lunes);
        dia.setDate(lunes.getDate() + i);
        if (dia <= hoy) dias.push(dia);
      }
      return dias;
    }

    const select = document.getElementById('fecha');
    const dias = getDiasSemana();
    const diasSemana = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    dias.reverse().forEach(dia => {
      const op = document.createElement('option');
      const yyyy = dia.getFullYear();
      const mm = String(dia.getMonth()+1).padStart(2,'0');
      const dd = String(dia.getDate()).padStart(2,'0');
      op.value = `${yyyy}-${mm}-${dd}`;
      op.text = `${diasSemana[dia.getDay()]} ${dd}/${mm}/${yyyy}`;
      select.appendChild(op);
    });

    async function registrar() {
      const fecha = document.getElementById('fecha').value;
      const horaInicio = document.getElementById('horaInicio').value;
      const horaFin = document.getElementById('horaFin').value;
      const observaciones = document.getElementById('observaciones').value;
      const msg = document.getElementById('msg');

      if (!horaInicio) {
        msg.className = 'msg error';
        msg.textContent = '❌ La hora de inicio es obligatoria.';
        return;
      }

      const url = `${FLOW_URL}&email=${encodeURIComponent(email)}&fecha=${fecha}&horaInicio=${encodeURIComponent(horaInicio)}&horaFin=${encodeURIComponent(horaFin)}&observaciones=${encodeURIComponent(observaciones)}`;

      try {
        await fetch(url, { method: 'GET', mode: 'no-cors' });
        msg.className = 'msg success';
        msg.textContent = '✅ Jornada registrada correctamente.';
      } catch {
        msg.className = 'msg error';
        msg.textContent = '❌ Error al registrar. Intenta de nuevo.';
      }
    }
  </script>
</body>
</html>
